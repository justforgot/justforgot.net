<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Under Construction</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0d0d0d;
      color: #e0e0e0;
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2rem;
      padding: 2rem;
    }

    .status-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #f87171;
      display: inline-block;
      margin-right: 8px;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    .badge {
      display: flex;
      align-items: center;
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 999px;
      padding: 6px 14px;
      font-size: 12px;
      color: #888;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    h1 {
      font-size: clamp(1.6rem, 5vw, 2.8rem);
      font-weight: 600;
      color: #f0f0f0;
      text-align: center;
      line-height: 1.3;
      letter-spacing: -0.02em;
    }

    h1 span {
      color: #555;
    }

    p.sub {
      color: #555;
      font-size: 0.95rem;
      text-align: center;
      max-width: 340px;
      line-height: 1.6;
    }

    .contact-btn {
      background: #1a1a1a;
      color: #e0e0e0;
      border: 1px solid #2e2e2e;
      border-radius: 10px;
      padding: 12px 24px;
      font-size: 0.9rem;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s, transform 0.1s;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .contact-btn:hover {
      background: #222;
      border-color: #444;
    }

    .contact-btn:active {
      transform: scale(0.97);
    }

    .discord-icon {
      width: 18px;
      height: 18px;
      fill: #7289da;
      flex-shrink: 0;
    }

    .overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.75);
      backdrop-filter: blur(4px);
      align-items: center;
      justify-content: center;
      z-index: 100;
      padding: 1rem;
    }

    .overlay.open {
      display: flex;
    }

    .modal {
      background: #141414;
      border: 1px solid #2a2a2a;
      border-radius: 16px;
      overflow: hidden;
      max-width: 400px;
      width: 100%;
      position: relative;
      animation: popIn 0.18s ease;
    }

    @keyframes popIn {
      from { transform: scale(0.92); opacity: 0; }
      to   { transform: scale(1);    opacity: 1; }
    }

    .modal-close {
      position: absolute;
      top: 12px;
      right: 14px;
      background: rgba(0,0,0,0.5);
      border: none;
      color: #ccc;
      font-size: 18px;
      cursor: pointer;
      line-height: 1;
      transition: color 0.1s;
      width: 28px;
      height: 28px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 10;
    }

    .modal-close:hover { color: #fff; background: rgba(0,0,0,0.7); }

    .profile-img {
      width: 100%;
      display: block;
      border-radius: 0;
    }

    .modal-footer {
      padding: 14px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      background: #0d0d0d;
      border-top: 1px solid #1e1e1e;
    }

    .username-box {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .username-box svg {
      width: 18px;
      height: 18px;
      fill: #7289da;
      flex-shrink: 0;
    }

    .username-box span {
      font-size: 0.95rem;
      font-weight: 500;
      color: #e0e0e0;
    }

    .copy-btn {
      background: #1e1e1e;
      border: 1px solid #2e2e2e;
      border-radius: 7px;
      color: #888;
      font-size: 12px;
      padding: 5px 12px;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
      white-space: nowrap;
    }

    .copy-btn:hover {
      background: #2a2a2a;
      color: #ddd;
    }

    .copy-btn.copied {
      color: #4ade80;
      border-color: #1f3a2a;
      background: #101f15;
    }
  </style>
</head>

    <span class="status-dot"></span>
